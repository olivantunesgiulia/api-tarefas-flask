<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List | Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main class="container">

        <h1>Lista de Tarefas</h1>

        <div class="input-area">
            <label for="input-tarefa" style="display: none;">Nova tarefa</label>
            <input type="text" id="input-tarefa" placeholder="Digite uma tarefa...">
            <button id="btn-adicionar" type="button">Adicionar</button>
        </div>

        <ul id="lista-tarefas"></ul>

    </main>

    <script src="script.js"></script>

</body>
</html>
